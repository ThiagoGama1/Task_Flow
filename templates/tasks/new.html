{{define "tasks/new"}}{{template "base" .}}{{end}}

{{define "title"}}Nova Tarefa{{end}}

{{define "content"}}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="d-flex align-items-center mb-4">
        <a href="/projects/{{.Project.ID}}" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h2 class="h4 fw-bold mb-0">Nova Tarefa</h2>
          <p class="text-muted small mb-0">{{.Project.Title}}</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          {{if .Error}}
          <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>{{.Error}}
          </div>
          {{end}}

          <form method="POST" action="/projects/{{.Project.ID}}/tasks" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control"
                     placeholder="Ex: Implementar autenticação"
                     value="{{if .Input}}{{.Input.Title}}{{end}}"
                     required minlength="2" maxlength="200" autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descrição</label>
              <textarea name="description" class="form-control" rows="3"
                        placeholder="Detalhes da tarefa...">{{if .Input}}{{.Input.Description}}{{end}}</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Responsável</label>
              <select name="assignee_id" class="form-select">
                <option value="">— Sem responsável —</option>
                {{range .Project.Members}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
              </select>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label fw-semibold">Prioridade <span class="text-danger">*</span></label>
                <select name="priority" class="form-select" required>
                  <option value="low"    {{if .Input}}{{if eq .Input.Priority "low"}}selected{{end}}{{end}}>Baixa</option>
                  <option value="medium" {{if .Input}}{{if eq .Input.Priority "medium"}}selected{{end}}{{else}}selected{{end}}>Média</option>
                  <option value="high"   {{if .Input}}{{if eq .Input.Priority "high"}}selected{{end}}{{end}}>Alta</option>
                </select>
              </div>
              <div class="col-sm-6">
                <label class="form-label fw-semibold">Prazo</label>
                <input type="date" name="due_date" class="form-control"
                       value="{{if .Input}}{{.Input.DueDate}}{{end}}">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Status <span class="text-danger">*</span></label>
              <select name="status" class="form-select" required>
                <option value="todo"        {{if .Input}}{{if eq .Input.Status "todo"}}selected{{end}}{{else}}selected{{end}}>A Fazer</option>
                <option value="in_progress" {{if .Input}}{{if eq .Input.Status "in_progress"}}selected{{end}}{{end}}>Em Andamento</option>
                <option value="done"        {{if .Input}}{{if eq .Input.Status "done"}}selected{{end}}{{end}}>Concluído</option>
              </select>
            </div>
            <div class="d-grid gap-2 d-sm-flex">
              <button type="submit" class="btn btn-primary flex-grow-1">
                <i class="bi bi-plus-lg me-1"></i>Criar Tarefa
              </button>
              <a href="/projects/{{.Project.ID}}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
