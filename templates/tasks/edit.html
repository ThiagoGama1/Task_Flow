{{define "tasks/edit"}}{{template "base" .}}{{end}}

{{define "title"}}Editar Tarefa{{end}}

{{define "content"}}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="d-flex align-items-center mb-4">
        <a href="/projects/{{.Project.ID}}" class="btn btn-sm btn-outline-secondary me-3">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h2 class="h4 fw-bold mb-0">Editar Tarefa</h2>
          <p class="text-muted small mb-0">{{.Project.Title}}</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          {{if .Error}}
          <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>{{.Error}}
          </div>
          {{end}}

          <form method="POST" action="/projects/{{.Project.ID}}/tasks/{{.Task.ID}}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control"
                     value="{{.Task.Title}}"
                     required minlength="2" maxlength="200">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descrição</label>
              <textarea name="description" class="form-control" rows="3">{{.Task.Description}}</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Responsável</label>
              <select name="assignee_id" class="form-select">
                <option value="">— Sem responsável —</option>
                {{range .Project.Members}}
                <option value="{{.ID}}" {{if $.Task.AssigneeID}}{{if eq .ID (deref $.Task.AssigneeID)}}selected{{end}}{{end}}>
                  {{.Name}}
                </option>
                {{end}}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Status <span class="text-danger">*</span></label>
              <select name="status" class="form-select" required>
                <option value="todo"        {{if eq .Task.Status "todo"}}selected{{end}}>A Fazer</option>
                <option value="in_progress" {{if eq .Task.Status "in_progress"}}selected{{end}}>Em Andamento</option>
                <option value="done"        {{if eq .Task.Status "done"}}selected{{end}}>Concluído</option>
              </select>
            </div>
            <div class="d-grid gap-2 d-sm-flex">
              <button type="submit" class="btn btn-primary flex-grow-1">
                <i class="bi bi-floppy me-1"></i>Salvar Alterações
              </button>
              <a href="/projects/{{.Project.ID}}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
