{{define "base"}}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}TaskFlow{{end}} — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold fs-5" href="/">
        <i class="bi bi-kanban-fill me-2"></i>TaskFlow
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          {{if .User}}
          <li class="nav-item">
            <a class="nav-link" href="/projects">
              <i class="bi bi-folder2 me-1"></i>Projetos
            </a>
          </li>
          {{end}}
        </ul>
        <ul class="navbar-nav">
          {{if .User}}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle me-1"></i>{{.User.Name}}
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <form action="/auth/logout" method="POST">
                  <button type="submit" class="dropdown-item text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i>Sair
                  </button>
                </form>
              </li>
            </ul>
          </li>
          {{else}}
          <li class="nav-item">
            <a class="nav-link" href="/auth/login">Entrar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/auth/register">Cadastrar</a>
          </li>
          {{end}}
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-4">
    {{block "content" .}}{{end}}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
