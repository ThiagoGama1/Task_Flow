{{define "login"}}{{template "base" .}}{{end}}

{{define "title"}}Entrar{{end}}

{{define "main-class"}}auth-wrap{{end}}

{{define "content"}}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card auth-card">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <div class="auth-logo-mark">
              <i class="bi bi-kanban-fill"></i>
            </div>
            <h2 class="h5 fw-bold mb-1">Bem-vindo de volta</h2>
            <p class="text-muted small mb-0">Acesse sua conta TaskFlow</p>
          </div>

          {{if .Error}}
          <div class="alert alert-danger py-2 small mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{.Error}}
          </div>
          {{end}}

          <form method="POST" action="/auth/login" novalidate>
            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input type="email" name="email" class="form-control"
                     placeholder="seu@email.com"
                     value="{{if .Input}}{{.Input.Email}}{{end}}" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input type="password" name="password" class="form-control"
                     placeholder="••••••" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                Entrar <i class="bi bi-arrow-right ms-1"></i>
              </button>
            </div>
          </form>

          <p class="text-center mt-4 mb-0 small text-muted">
            Não tem conta?
            <a href="/auth/register" class="fw-semibold text-decoration-none" style="color:var(--accent)">Cadastre-se</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
